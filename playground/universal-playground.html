<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliJS | Universal Playground</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    
    <style>
        :root {
            --bg: #030712;
            --sidebar-bg: rgba(17, 24, 39, 0.95);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(31, 41, 55, 0.5);
            --glass: rgba(255, 255, 255, 0.02);
            --sidebar-width: 380px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
        }

        aside {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(30px);
            z-index: 100;
        }

        .sidebar-header { padding: 32px 28px; border-bottom: 1px solid var(--border); }
        .logo-container { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
        .logo-text { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; color: var(--accent); }
        .version-badge { font-size: 0.7rem; font-weight: 800; background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 99px; text-transform: uppercase; }

        .search-input {
            width: 100%; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 14px;
            color: white; font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); background: rgba(0,0,0,0.4); }

        .feature-list { flex: 1; overflow-y: auto; padding: 20px; }
        .category-group { margin-bottom: 28px; }
        .category-title { padding: 10px 14px; font-size: 0.75rem; font-weight: 950; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.7; }
        
        .feature-item {
            padding: 12px 14px; margin: 4px 0; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent;
        }
        .feature-item:hover { background: var(--glass); border-color: var(--border); }
        .feature-item.active { background: var(--accent-glow); border-color: rgba(56, 189, 248, 0.5); color: var(--accent); transform: translateX(4px); }
        .feature-id { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; opacity: 0.3; width: 28px; }
        .feature-name { font-size: 0.95rem; font-weight: 600; }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .content-header { padding: 48px 64px 32px 64px; }
        .content-header h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 12px; }
        .content-header p { color: var(--text-muted); font-size: 1.2rem; max-width: 900px; line-height: 1.7; font-weight: 500; }

        .playground-workspace { flex: 1; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; padding: 0 64px 64px 64px; overflow: hidden; }
        .window-pane { background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(20px); box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        .pane-header { padding: 20px 32px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .pane-title { font-size: 0.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
        .pane-title i { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
        
        .pane-body { flex: 1; overflow-y: auto; position: relative; }
        #demo-canvas { background: white; min-height: 100%; padding: 56px; color: #0f172a; }
        #code-display { padding: 0; background: #010409; height: 100%; margin: 0; }
        pre[class*="language-"] { margin: 0 !important; padding: 32px !important; background: transparent !important; font-size: 1rem !important; line-height: 1.8 !important; }

        .btn { background: var(--accent); color: var(--bg); border: none; padding: 14px 28px; border-radius: 14px; font-weight: 900; font-size: 0.95rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; gap: 12px; }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 12px 30px var(--accent-glow); filter: brightness(1.1); }
        .btn:active { transform: translateY(-1px); }
        .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; }
        .btn-outline:hover { background: var(--glass); border-color: rgba(255,255,255,0.2); }

        .action-bar { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; z-index: 20; }

        /* Demo Components Styling */
        .demo-card { border: 1px solid #e2e8f0; border-radius: 20px; padding: 32px; background: #ffffff; margin-bottom: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border-left: 6px solid #3b82f6; color: #1e293b; }
        .demo-card h3 { margin-bottom: 12px; font-weight: 700; color: #0f172a; }
        .demo-input { width: 100%; padding: 16px 22px; border: 2px solid #cbd5e1; border-radius: 14px; margin: 14px 0; font-size: 1.1rem; outline: none; transition: 0.2s; font-family: inherit; }
        .demo-input:focus { border-color: #3b82f6; ring: 4px rgba(59, 130, 246, 0.1); }
        .demo-btn { background: #1e293b; color: white; border: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; margin: 8px 6px 8px 0; font-size: 1rem; }
        .demo-btn:hover { background: #334155; transform: scale(1.05); }
        .demo-label { font-size: 0.85rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: block; }
        
        .loading-pulse { animation: pulse 1.5s infinite; color: #64748b; font-weight: 700; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 1400px) {
            .playground-workspace { grid-template-columns: 1fr; overflow-y: auto; }
            .window-pane { min-height: 550px; }
            body { overflow-y: auto; height: auto; }
            aside { height: 100vh; position: sticky; top: 0; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">
            <div class="logo-container">
                <span style="font-size: 2.5rem">💎</span>
                <div>
                    <div class="logo-text">SimpliJS</div>
                    <span class="version-badge">v1.5.0 MASTER</span>
                </div>
            </div>
            <input type="text" id="search" class="search-input" placeholder="Search 54 core features...">
        </div>
        <div class="feature-list" id="feature-list"></div>
    </aside>

    <main>
        <div class="content-header">
            <h1 id="feature-title">SimpliJS Playground</h1>
            <p id="feature-desc">The ultimate interactive environment to master the 54 features that make SimpliJS the most accessible framework for modern developers.</p>
        </div>

        <div class="playground-workspace">
            <div class="window-pane">
                <div class="pane-header">
                    <div class="pane-title"><i></i> Interactive Visual Canvas</div>
                    <button class="btn btn-outline" style="padding: 8px 18px; font-size: 0.8rem;" id="reset-btn">Reset Interface</button>
                </div>
                <div class="pane-body">
                    <div id="demo-canvas"></div>
                </div>
            </div>

            <div class="window-pane">
                <div class="pane-header">
                    <div class="pane-title"><i></i> Source Code Inspection</div>
                    <button class="btn btn-outline" style="padding: 8px 18px; font-size: 0.8rem;" id="copy-btn">Copy Snippet</button>
                </div>
                <div class="pane-body" style="background: #010409;">
                    <pre id="code-display" class="language-javascript"><code></code></pre>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn" id="run-btn">Run Snippet ⚡</button>
        </div>
    </main>

    <script>

        const FEATURES = [
            // CATEGORY: CORE JS API
            { id: 1, cat: 'Core JS', name: 'Component Registration', desc: 'Define native Custom Elements effortlessly.', code: `const { component } = SimpliJS;\n\ncomponent('simple-tag', () => ({\n  render: () => "<h3>I am a Component!</h3>"\n}));`, html: `<div class="demo-card"><simple-tag></simple-tag></div>` },
            { id: 2, cat: 'Core JS', name: 'Deeply Reactive State', desc: 'State is tracked using deep Proxies.', code: `const { reactive, component } = SimpliJS;\nconst state = reactive({ count: 0 });\n\ncomponent('reactive-demo', () => ({\n  add: () => state.count++,\n  render: () => \`<h3>Value: \${state.count}</h3><button class="demo-btn" @click="add">Increment</button>\`\n}));`, html: `<div class="demo-card"><reactive-demo></reactive-demo></div>` },
            { id: 3, cat: 'Core JS', name: 'Reactive Props', desc: 'Sync HTML attributes into a reactive props object.', code: `const { component } = SimpliJS;\n\ncomponent('hello-user', (el, props) => ({\n  render: () => \`<h3>Hello, \${props.name || 'Stranger'}!</h3>\`\n}));`, html: `<div class="demo-card"><hello-user name="Developer"></hello-user></div>` },

            { id: 5, cat: 'Core JS', name: 'Computed Properties', desc: 'Derive state based on other reactive variables.', code: `const { reactive, computed, component } = SimpliJS;\nconst s = reactive({ n: 5 });\nconst sq = computed(() => s.n * s.n);\n\ncomponent('comp-demo', () => ({\n  up: () => s.n++,\n  render: () => \`<h3>\${s.n}^2 = \${sq.value}</h3><button class="demo-btn" @click="up">Add 1</button>\`\n}));`, html: `<div class="demo-card"><comp-demo></comp-demo></div>` },
            { id: 6, cat: 'Core JS', name: 'Side Effects (Watch)', desc: 'Specifically watch a piece of state.', code: `const { reactive, watch, component } = SimpliJS;\nconst s = reactive({ query: '' });\nwatch(() => s.query, (v) => console.log('Updated:', v));\n\ncomponent('watch-demo', () => ({\n  render: () => '<input class="demo-input" oninput="this.closest(\\'watch-demo\\').up(event)" placeholder="Type...">',\n  up: (e) => s.query = e.target.value\n}));`, html: `<div class="demo-card"><watch-demo></watch-demo><p>(Check console)</p></div>` },

            { id: 9, cat: 'Core JS', name: 'Content Projection', desc: 'Support native slots.', code: `const { component } = SimpliJS;\n\ncomponent('card-box', () => ({\n  render: () => \`<div style="border:2px solid #38bdf8;padding:15px"><h3>Header</h3><slot></slot></div>\`\n}));`, html: `<div class="demo-card"><card-box><p>Slotted content</p></card-box></div>` },
            { id: 10, cat: 'Core JS', name: 'Global Event Bus', desc: 'emit/on messaging system.', code: `const { emit, on, component } = SimpliJS;\non('ping', (d) => alert(d));\n\ncomponent('bus-demo', () => ({\n  render: () => '<button class="demo-btn" @click="do">Emit</button>',\n  do: () => emit('ping', 'Pong!')\n}));`, html: `<div class="demo-card"><bus-demo></bus-demo></div>` },
            { id: 11, cat: 'Core JS', name: 'Form Automation', desc: 'Handle form data collection.', code: `const { createApp, component } = SimpliJS;\nconst logic = createApp().form({ submit: d => alert('User: ' + d.user) });\n\ncomponent('login-box', () => ({\n  logic,\n  render: () => \`<form @submit="logic"><input name="user" class="demo-input"><button class="demo-btn">Submit</button></form>\`\n}));`, html: `<div class="demo-card"><login-box></login-box></div>` },

        const listEl = document.getElementById('feature-list');
        const titleEl = document.getElementById('feature-title');
        const descEl = document.getElementById('feature-desc');
        const codeEl = document.querySelector('#code-display code');
        const canvasEl = document.getElementById('demo-canvas');
        const searchInput = document.getElementById('search');

        function renderList(query = '') {
            listEl.innerHTML = '';
            const grouped = FEATURES.reduce((acc, f) => {
                if (!query || f.name.toLowerCase().includes(query.toLowerCase()) || f.cat.toLowerCase().includes(query.toLowerCase())) {
                    if (!acc[f.cat]) acc[f.cat] = [];
                    acc[f.cat].push(f);
                }
                return acc;
            }, {});

            for (const [cat, items] of Object.entries(grouped)) {
                const group = document.createElement('div');
                group.className = 'category-group';
                group.innerHTML = '<div class="category-title">' + cat + '</div>';
                
                items.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'feature-item' + (window.currentId === f.id ? ' active' : '');
                    item.innerHTML = '<span class="feature-id">' + f.id + '</span><span class="feature-name">' + f.name + '</span>';
                    item.onclick = () => selectFeature(f);
                    group.appendChild(item);
                });
                listEl.appendChild(group);
            }
        }

        function selectFeature(f) {
            window.currentId = f.id;
            titleEl.textContent = f.name;
            descEl.textContent = f.desc;
            codeEl.textContent = f.code + (f.html ? '\n\n/* HTML USAGE */\n' + f.html : '');
            Prism.highlightElement(codeEl);
            renderList(searchInput.value);
            runDemo(f);
        }

        function runDemo(f) {
            canvasEl.innerHTML = f.html || '<p>API Demo</p>';
            try {
                if (f.code) {
                   // Cleanly evaluate code
                   const runner = new Function('SimpliJS', f.code);
                   runner(window.SimpliJS);
                }
                // Scan for directives
                setTimeout(() => window.SimpliJS.directives.scan(canvasEl), 20);
            } catch(e) { console.error(e); }
        }

        searchInput.oninput = (e) => renderList(e.target.value);
        document.getElementById('run-btn').onclick = () => {
             const f = FEATURES.find(x => x.id === window.currentId);
             if (f) runDemo(f);
        };
        document.getElementById('reset-btn').onclick = () => {
             const f = FEATURES.find(x => x.id === window.currentId);
             if (f) runDemo(f);
        };
        document.getElementById('copy-btn').onclick = () => {
            const f = FEATURES.find(x => x.id === window.currentId);
            if (f) {
                navigator.clipboard.writeText(f.code + '\n' + (f.html || ''));
                document.getElementById('copy-btn').textContent = 'COPIED';
                setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy Snippet', 1000);
            }
        };

        window.onload = () => { renderList(); if (FEATURES.length > 0) selectFeature(FEATURES[0]); };
    </script>
