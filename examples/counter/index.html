<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliJS - Counter Example</title>
    <script src="../../dist/simplijs.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #0066cc; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 1rem; margin: 0 0.5rem; }
        button:hover { background: #0052a3; }
        h1 { margin-top: 0; }
        .count { font-size: 3rem; font-weight: bold; margin: 1rem 0; color: #333; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const { reactive, component, createApp } = SimpliJS;

        // Reactive state
        const state = reactive({ count: 0 });

        // Global functions for inline event handlers
        window.increment = () => state.count++;
        window.decrement = () => state.count--;

        // Define a component
        component('counter-app', () => {
            return () => `
                <div class="card">
                    <h1>SimpliJS Counter</h1>
                    <div class="count">${state.count}</div>
                    <button onclick="decrement()">- Decrement</button>
                    <button onclick="increment()">+ Increment</button>
                </div>
            `;
        });

        // Bootstrap App
        createApp('#app').view(() => '<counter-app></counter-app>').mount();
    </script>
</body>
</html>
