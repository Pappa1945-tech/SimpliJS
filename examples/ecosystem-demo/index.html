<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliJS Ecosystem Showcase</title>
    <style>
        :root { --primary: #4fc3f7; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 20px; }
        #app { max-width: 800px; margin: 0 auto; padding: 20px; background: var(--card); border-radius: 12px; }
        .nav { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .nav a { color: var(--primary); margin-right: 15px; text-decoration: none; font-weight: bold; }
        .plugin-badge { background: #333; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 5px; }
        .simpli-auth-card { padding: 20px; background: #222; border: 1px solid #444; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #444; color: #fff; }
        button { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/login">Auth Demo</a>
            <a href="/vault">Vault Demo</a>
            <a href="/bridge">Bridge Demo</a>
        </div>
        <div id="router-view">Loading...</div>
    </div>

    <!-- Load SimpliJS Core -->
    <script type="module" src="http://localhost:8080/dist/simplijs.js"></script>
    
    <!-- Load Plugins -->
    <script type="module">
        import { createRouter } from '/packages/router/index.js';
        import { createVault } from '/packages/vault/index.js';
        import { initDevTools } from '/packages/devtools/index.js';
        import { createAuth, AuthUI } from '/packages/auth/index.js';
        import { bridge } from '/packages/bridge/index.js';
        import { createForm } from '/packages/forms/index.js';

        // Wait for Core to initialize
        setTimeout(() => {
            const { reactive, html } = window.Simpli;

            // 1. Auth Plugin
            const auth = createAuth({ onRedirect: (p) => router.navigate(p) });

            // 2. Vault Plugin
            const state = createVault({ count: 0, user: 'Guest' }, { persist: true });

            // 3. Router Plugin
            const router = createRouter({
                '/': () => `
                    <h1>Welcome to SimpliJS Ecosystem</h1>
                    <p>Current Count: ${state.count}</p>
                    <button onclick="Simpli.state.count++">Increment</button>
                    <div style="margin-top:20px;">
                        <span class="plugin-badge">@simplijs/vault-pro</span>
                        <span class="plugin-badge">@simplijs/router</span>
                    </div>
                `,
                '/login': () => `
                    <h1>Authentication</h1>
                    ${AuthUI.loginForm('handleLogin')}
                `,
                '/vault': () => `
                    <h1>Time Vault Debugging</h1>
                    <p>Change state then use buttons below</p>
                    <button onclick="Simpli.state.vault.undo()">Undo</button>
                    <button onclick="Simpli.state.vault.redo()">Redo</button>
                    <button onclick="Simpli.state.vault.checkpoint('save1')">Checkpoint</button>
                `,
                '/bridge': () => `
                    <h1>Bridge Adapters</h1>
                    <div id="react-container">Loading React...</div>
                    <script>
                        // Example dynamic bridge
                        const tag = window.bridge.react('https://esm.sh/react-confetti', 'confetti');
                        document.getElementById('react-container').innerHTML = '<' + tag + ' />';
                    &lt;/script&gt;
                `
            }, { root: '#router-view', mode: 'hash' });

            // 4. DevTools
            initDevTools(null);

            // Export to global for inline onclick handlers
            window.Simpli.state = state;
            window.handleLogin = (data) => {
                auth.user = { email: data.get('email') };
                auth.isAuthenticated = true;
                router.navigate('/');
            };
        }, 100);
    </script>
</body>
</html>
