<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliJS - Simple Blog (Dynamic Routing)</title>
    <script src="../../packages/simplijs/dist/simplijs.js"></script>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; background: #fff; }
        header { border-bottom: 1px solid #eee; padding-bottom: 2rem; margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-family: 'Outfit', sans-serif; font-size: 2.5rem; }
        nav a { margin-left: 1.5rem; text-decoration: none; color: #3b82f6; font-family: sans-serif; font-weight: 600; }
        nav a.active { color: #111; border-bottom: 2px solid #111; }
        
        .post-card { margin-bottom: 3rem; }
        .post-card a { font-size: 1.8rem; font-weight: 700; color: #111; text-decoration: none; font-family: 'Outfit', sans-serif; display: block; margin-bottom: 0.5rem;}
        .post-card a:hover { color: #3b82f6; }
        .post-card p { color: #666; margin: 0; }
        
        .post-full h2 { font-size: 3rem; margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif; }
        .meta { color: #999; margin-bottom: 2rem; font-family: sans-serif; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        .content { font-size: 1.2rem; line-height: 1.8; color: #444; }
        .back-link { display: inline-block; margin-top: 3rem; color: #3b82f6; text-decoration: none; font-weight: 600; font-family: sans-serif; }
        
        #app { min-height: 400px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>SimpliBlog</h1>
        <nav>
            <a href="#/" s-link="/">Home</a>
            <a href="#/about" s-link="/about">About</a>
        </nav>
    </header>

    <main id="app">
        <!-- Content will be rendered here -->
    </main>

    <script>
        const { createRouter } = SimpliJS;

        const posts = {
            '1': { title: "The Anti-Build Movement", date: "Oct 10, 2026", content: "We spend too much time configuring tools and not enough time writing code. SimpliJS brings back the joy of web development by using standard ESM and native browser features." },
            '2': { title: "Why HTML-First Matters", date: "Oct 15, 2026", content: "Directives in HTML make reactivity intuitive. Instead of complex state management libraries, we use attributes to describe behavior. It's cleaner, faster, and easier to maintain." }
        };

        const router = createRouter({
            '/': () => `
                <div class="fade-in">
                    ${Object.entries(posts).map(([id, post]) => `
                        <div class="post-card">
                            <a href="#/post/${id}">${post.title}</a>
                            <p>A deep dive into why we built SimpliJS.</p>
                        </div>
                    `).join('')}
                </div>
            `,
            '/about': () => `
                <div class="fade-in">
                    <h2>About This Blog</h2>
                    <p>Built entirely with <strong>SimpliJS</strong> using its built-in router with dynamic parameter support.</p>
                </div>
            `,
            '/post/:id': (params) => {
                const post = posts[params.id];
                if (!post) return '<div class="fade-in"><h2>Post Not Found</h2><a href="#/" class="back-link">← Back Home</a></div>';
                
                return `
                    <div class="post-full fade-in">
                        <h2>${post.title}</h2>
                        <div class="meta">${post.date} • 5 min read</div>
                        <div class="content">${post.content}</div>
                        <a href="#/" class="back-link">← Back to Feed</a>
                    </div>
                `;
            },
            '*': '<h1>404 Not Found</h1>'
        }, { root: '#app', mode: 'hash' });
    </script>
</body>
</html>
