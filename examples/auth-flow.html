<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliJS | Auth Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --bg: #f8fafc;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; }

        .auth-card { background: white; width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); position: relative; overflow: hidden; }
        
        .auth-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(to right, var(--primary), var(--primary-light)); }

        h2 { font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; color: #1e293b; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.875rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }
        input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-family: inherit; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); outline: none; }
        input.invalid { border-color: var(--error); background-color: #fef2f2; }

        .error-msg { color: var(--error); font-size: 0.75rem; margin-top: 0.25rem; height: 1rem; }

        button.submit-btn { width: 100%; background: var(--primary); color: white; padding: 0.875rem; border: none; border-radius: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 1rem; }
        button.submit-btn:hover { background: var(--primary-light); transform: translateY(-1px); }
        button.submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .toggle-text { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: #64748b; }
        .toggle-text span { color: var(--primary); cursor: pointer; font-weight: 600; }

        /* Success State */
        .success-overlay { text-align: center; }
        .success-icon { font-size: 4rem; color: var(--success); margin-bottom: 1rem; }
    </style>
</head>
<body s-app s-state="{ 
    mode: 'login', 
    email: '', 
    password: '', 
    name: '',
    loading: false,
    done: false,
    errors: { email: '', password: '', name: '' },
    get isValid() {
        if (this.mode === 'signup' && !this.name) return false;
        return this.email.includes('@') && this.password.length >= 6;
    }
}">

    <div class="auth-card">
        <div s-if="!done">
            <h2 s-text="mode === 'login' ? 'Welcome Back' : 'Create Account'"></h2>
            <p class="subtitle" s-text="mode === 'login' ? 'Enter your details to access your account' : 'Start your journey with SimpliJS today'"></p>

            <form s-submit="loading = true; setTimeout(() => { loading = false; done = true; }, 1500)">
                
                <div class="form-group" s-if="mode === 'signup'">
                    <label>Full Name</label>
                    <input type="text" s-bind="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" s-bind="email" placeholder="you@example.com" s-class="{ invalid: email && !email.includes('@') }">
                    <div class="error-msg" s-show="email && !email.includes('@')">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" s-bind="password" placeholder="••••••••">
                    <div class="error-msg" s-show="password && password.length < 6">Password must be at least 6 characters</div>
                </div>

                <button type="submit" class="submit-btn" s-attr:disabled="!isValid || loading">
                    <span s-show="!loading" s-text="mode === 'login' ? 'Sign In' : 'Sign Up'"></span>
                    <span s-show="loading">Processing...</span>
                </button>
            </form>

            <div class="toggle-text">
                <span s-if="mode === 'login'">Don't have an account? <span s-click="mode = 'signup'">Sign Up</span></span>
                <span s-else>Already have an account? <span s-click="mode = 'login'">Sign In</span></span>
            </div>
        </div>

        <!-- Success State -->
        <div s-if="done" class="success-overlay">
            <div class="success-icon">✓</div>
            <h2 s-text="mode === 'login' ? 'Login Successful' : 'Account Created'"></h2>
            <p class="subtitle">Redirecting you to the dashboard...</p>
            <button class="submit-btn" s-click="done = false; email = ''; password = ''; name = '';">Back to start</button>
        </div>
    </div>

    <script type="module">
        import { directives } from '../packages/simplijs/src/index.js';
    </script>
</body>
</html>
